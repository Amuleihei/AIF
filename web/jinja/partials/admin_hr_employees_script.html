    <script>
        var teamPositionsMap = {{ data.team_positions_map | tojson }};
        var positionLabelMap = {{ data.position_label_map | tojson }};
        var selectedAttendanceNames = [];
        var attendanceSubmitting = false;
        var attendanceBubbleName = '';
        var attendanceInputSheetAction = '';

        function lockFormSubmit(form) {
            if (!form) return true;
            if (form.dataset.submitting === '1') return true;
            form.dataset.submitting = '1';
            var submitButtons = form.querySelectorAll('button[type="submit"], input[type="submit"]');
            submitButtons.forEach(function(btn) {
                btn.disabled = true;
                if (btn.tagName === 'BUTTON') {
                    btn.dataset.originalText = btn.textContent;
                    btn.textContent = '{{ texts.get("saving_label", "保存中...") }}';
                }
            });
            return false;
        }

        function openAddEmployeeModal() {
            closeEditForm();
            closeSpecialTaskModal();
            var modal = document.getElementById('add-employee-modal');
            if (!modal) return;
            modal.classList.add('show');
            modal.setAttribute('aria-hidden', 'false');
            var nameEl = document.getElementById('add-employee-name');
            if (nameEl) {
                setTimeout(function() { nameEl.focus(); }, 0);
            }
        }

        function closeAddEmployeeModal() {
            var modal = document.getElementById('add-employee-modal');
            if (!modal) return;
            modal.classList.remove('show');
            modal.setAttribute('aria-hidden', 'true');
        }

        function handleAddEmployeeBackdropClick(evt) {
            if (!evt || evt.target !== evt.currentTarget) return;
            closeAddEmployeeModal();
        }

        function openSpecialTaskModal() {
            closeEditForm();
            closeAddEmployeeModal();
            closeLeftEmployeesModal();
            var modal = document.getElementById('special-task-modal');
            if (!modal) return;
            modal.classList.add('show');
            modal.setAttribute('aria-hidden', 'false');
            var nameEl = document.getElementById('special-task-name');
            if (nameEl) {
                setTimeout(function() { nameEl.focus(); }, 0);
            }
        }

        function closeSpecialTaskModal() {
            var modal = document.getElementById('special-task-modal');
            if (!modal) return;
            modal.classList.remove('show');
            modal.setAttribute('aria-hidden', 'true');
        }

        function handleSpecialTaskBackdropClick(evt) {
            if (!evt || evt.target !== evt.currentTarget) return;
            closeSpecialTaskModal();
        }

        function openAttendanceViewModal() {
            closeLeftEmployeesModal();
            var modal = document.getElementById('attendance-view-modal');
            if (!modal) return;
            modal.classList.add('show');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeAttendanceViewModal() {
            var modal = document.getElementById('attendance-view-modal');
            if (!modal) return;
            modal.classList.remove('show');
            modal.setAttribute('aria-hidden', 'true');
        }

        function handleAttendanceViewBackdropClick(evt) {
            if (!evt || evt.target !== evt.currentTarget) return;
            closeAttendanceViewModal();
        }

        function openPayrollViewModal() {
            closeLeftEmployeesModal();
            var modal = document.getElementById('payroll-view-modal');
            if (!modal) return;
            modal.classList.add('show');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closePayrollViewModal() {
            var modal = document.getElementById('payroll-view-modal');
            if (!modal) return;
            modal.classList.remove('show');
            modal.setAttribute('aria-hidden', 'true');
        }

        function handlePayrollViewBackdropClick(evt) {
            if (!evt || evt.target !== evt.currentTarget) return;
            closePayrollViewModal();
        }

        function toggleAddForm() {
            var modal = document.getElementById('add-employee-modal');
            if (!modal) return;
            if (modal.classList.contains('show')) {
                closeAddEmployeeModal();
                return;
            }
            openAddEmployeeModal();
        }

        function openLeftEmployeesModal() {
            closeEditForm();
            closeAddEmployeeModal();
            closeSpecialTaskModal();
            var modal = document.getElementById('left-employees-modal');
            if (!modal) return;
            modal.classList.add('show');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeLeftEmployeesModal() {
            var modal = document.getElementById('left-employees-modal');
            if (!modal) return;
            modal.classList.remove('show');
            modal.setAttribute('aria-hidden', 'true');
        }

        function handleLeftEmployeesBackdropClick(evt) {
            if (!evt || evt.target !== evt.currentTarget) return;
            closeLeftEmployeesModal();
        }

        function refreshPositionOptionsByIds(teamId, posId) {
            var teamEl = document.getElementById(teamId);
            var posEl = document.getElementById(posId);
            if (!teamEl || !posEl) return;

            var selectedTeam = teamEl.value || '';
            var current = posEl.value || '';
            var positions = [];
            if (selectedTeam && Array.isArray(teamPositionsMap[selectedTeam])) {
                positions = teamPositionsMap[selectedTeam];
            } else {
                var merged = [];
                for (var team in teamPositionsMap) {
                    if (!Array.isArray(teamPositionsMap[team])) continue;
                    merged = merged.concat(teamPositionsMap[team]);
                }
                var seen = {};
                positions = merged.filter(function(v) {
                    if (!v || seen[v]) return false;
                    seen[v] = true;
                    return true;
                }).sort();
            }

            posEl.innerHTML = '<option value="">{{ texts.get("hr_select_position", "请选择岗位") }}</option>';
            positions.forEach(function(p) {
                var opt = document.createElement('option');
                opt.value = p;
                opt.textContent = positionLabelMap[p] || p;
                if (p === current) opt.selected = true;
                posEl.appendChild(opt);
            });
        }

        function openEditForm(row) {
            var box = document.getElementById('edit-employee-modal');
            if (!box || !row) return;
            closeAddEmployeeModal();
            closeSpecialTaskModal();

            document.getElementById('edit-original-name').value = row.name || '';
            document.getElementById('edit-name').value = row.name || '';
            document.getElementById('edit-team-select').value = row.team || '';
            refreshPositionOptionsByIds('edit-team-select', 'edit-position-select');
            document.getElementById('edit-position-select').value = row.position || '';
            document.getElementById('edit-salary-type-select').value = row.salary_type || '';
            document.getElementById('edit-salary-value').value = (row.salary_value || 0);
            document.getElementById('edit-join-date').value = row.join_date || '';
            document.getElementById('edit-status-select').value = row.status || '在岗';
            box.classList.add('show');
            box.setAttribute('aria-hidden', 'false');
        }

        function closeEditForm() {
            var box = document.getElementById('edit-employee-modal');
            if (!box) return;
            box.classList.remove('show');
            box.setAttribute('aria-hidden', 'true');
        }

        function handleEditEmployeeBackdropClick(evt) {
            if (!evt || evt.target !== evt.currentTarget) return;
            closeEditForm();
        }

        function renderSelectedCount() {
            var el = document.getElementById('selected-count');
            if (!el) return;
            el.textContent = '{{ texts.get("selected_label", "已选") }} ' + selectedAttendanceNames.length;
        }

        function syncAttendanceHiddenFields() {
            var input = document.getElementById('attendance-batch-names');
            if (!input) return;
            input.value = JSON.stringify(selectedAttendanceNames);
        }

        function openAttendanceActionBubble(card, evt) {
            if (!card || card.style.display === 'none') return;
            if (evt) evt.stopPropagation();
            var name = card.getAttribute('data-name') || '';
            if (!name) return;
            attendanceBubbleName = name;
            var bubble = document.getElementById('attendance-action-bubble');
            var backdrop = document.getElementById('attendance-action-backdrop');
            var title = document.getElementById('attendance-action-title');
            if (!bubble || !title || !backdrop) return;
            title.textContent = name + ' · {{ texts.get("hr_quick_actions", "快捷操作") }}';
            bubble.style.display = 'block';
            backdrop.style.display = 'block';
            var rect = card.getBoundingClientRect();
            var bubbleWidth = Math.min(320, window.innerWidth - 24);
            var anchorX = rect.left + rect.width * 0.5;
            var left = Math.max(12, Math.min(anchorX - bubbleWidth * 0.5, window.innerWidth - bubbleWidth - 12));
            var top = rect.top + rect.height * 0.5 + 10;
            var placedAbove = false;
            if (top > window.innerHeight - 220) {
                top = Math.max(12, rect.top - 196);
                placedAbove = true;
            }
            bubble.style.left = left + 'px';
            bubble.style.top = top + 'px';
            bubble.style.transformOrigin = (anchorX - left) + 'px ' + (placedAbove ? '100%' : '0px');
            bubble.style.setProperty('--attendance-arrow-x', (anchorX - left) + 'px');
            bubble.classList.toggle('is-above-anchor', placedAbove);
            bubble.classList.remove('is-visible');
            backdrop.classList.remove('is-visible');
            document.querySelectorAll('.emp-card.selected').forEach(function(x){ x.classList.remove('selected'); });
            card.classList.add('selected');
            card.classList.add('is-pressed');
            window.setTimeout(function() {
                if (card) card.classList.remove('is-pressed');
            }, 140);
            window.requestAnimationFrame(function() {
                window.requestAnimationFrame(function() {
                    backdrop.classList.add('is-visible');
                    bubble.classList.add('is-visible');
                });
            });
        }

        function closeAttendanceActionBubble() {
            attendanceBubbleName = '';
            var bubble = document.getElementById('attendance-action-bubble');
            var backdrop = document.getElementById('attendance-action-backdrop');
            if (bubble) {
                bubble.classList.remove('is-visible');
                window.setTimeout(function() {
                    if (!bubble.classList.contains('is-visible')) {
                        bubble.style.display = 'none';
                    }
                }, 180);
            }
            if (backdrop) {
                backdrop.classList.remove('is-visible');
                window.setTimeout(function() {
                    if (!backdrop.classList.contains('is-visible')) {
                        backdrop.style.display = 'none';
                    }
                }, 180);
            }
            document.querySelectorAll('.emp-card.selected').forEach(function(card) {
                card.classList.remove('selected');
            });
        }

        function applyEmpCardFilter() {
            var filterEl = document.getElementById('card-status-filter');
            var target = filterEl ? (filterEl.value || 'all') : 'all';
            document.querySelectorAll('.emp-card').forEach(function(card) {
                var status = card.getAttribute('data-att-status') || 'absent';
                var show = (target === 'all' || status === target);
                card.style.display = show ? '' : 'none';
                if (!show) {
                    card.classList.remove('selected');
                    var name = card.getAttribute('data-name') || '';
                    var idx = selectedAttendanceNames.indexOf(name);
                    if (idx >= 0) selectedAttendanceNames.splice(idx, 1);
                }
            });
            renderSelectedCount();
            syncAttendanceHiddenFields();
        }

        function selectAllVisibleEmpCards() {
            closeAttendanceActionBubble();
            document.querySelectorAll('.emp-card').forEach(function(card) {
                if (card.style.display === 'none') return;
                var name = card.getAttribute('data-name') || '';
                if (!name) return;
                if (selectedAttendanceNames.indexOf(name) < 0) {
                    selectedAttendanceNames.push(name);
                }
                card.classList.add('selected');
            });
            renderSelectedCount();
            syncAttendanceHiddenFields();
        }

        function clearSelectedEmpCards() {
            selectedAttendanceNames = [];
            document.querySelectorAll('.emp-card.selected').forEach(function(card) {
                card.classList.remove('selected');
            });
            renderSelectedCount();
            syncAttendanceHiddenFields();
        }

        function oneClickAttendance() {
            selectAllVisibleEmpCards();
            submitAttendanceBatch('present');
        }

        function getEmpCardByName(name) {
            var found = null;
            document.querySelectorAll('.emp-card').forEach(function(card) {
                if (found) return;
                if ((card.getAttribute('data-name') || '') === (name || '')) {
                    found = card;
                }
            });
            return found;
        }

        function submitAttendanceBatch(action) {
            if (attendanceSubmitting) return;
            if (!selectedAttendanceNames.length) {
                alert('{{ texts.get("hr_select_employee", "请选择员工") }}');
                return;
            }
            if ((action || '') === 'special_off') {
                var specialHoursEl = document.getElementById('attendance-special-hours');
                var specialHours = specialHoursEl ? Number(specialHoursEl.value || 0) : 0;
                if (!Number.isFinite(specialHours) || specialHours <= 0) {
                    alert('{{ texts.get("hr_special_hours", "特殊工时（h）") }} > 0');
                    return;
                }
            }
            if ((action || '') === 'present') {
                var skipNames = [];
                selectedAttendanceNames.slice().forEach(function(name) {
                    var card = getEmpCardByName(name);
                    if (!card) return;
                    var attStatus = card.getAttribute('data-att-status') || '';
                    if (attStatus !== 'sick' && attStatus !== 'leave' && attStatus !== 'rest') return;
                    var text = attStatus === 'sick'
                        ? '{{ texts.get("hr_status_sick", "病假") }}'
                        : (attStatus === 'rest'
                            ? '{{ texts.get("rest_label", "休息") }}'
                            : '{{ texts.get("hr_status_leave", "休假") }}');
                    var ok = confirm(name + ' {{ texts.get("hr_leave_confirm_prompt", "正在") }} ' + text + ' {{ texts.get("hr_leave_confirm_suffix", "确定要出勤吗？取消则跳过该员工。") }}');
                    if (!ok) {
                        skipNames.push(name);
                    }
                });
                if (skipNames.length) {
                    selectedAttendanceNames = selectedAttendanceNames.filter(function(n) {
                        return skipNames.indexOf(n) < 0;
                    });
                    skipNames.forEach(function(name) {
                        var c = getEmpCardByName(name);
                        if (c) c.classList.remove('selected');
                    });
                    renderSelectedCount();
                    syncAttendanceHiddenFields();
                }
                if (!selectedAttendanceNames.length) {
                    alert('{{ texts.get("hr_no_selected_after_skip", "已全部跳过，本次未提交。") }}');
                    return;
                }
            }
            var actionEl = document.getElementById('attendance-batch-action');
            if (!actionEl) return;
            actionEl.value = action || '';
            syncAttendanceHiddenFields();
            var formWrap = document.getElementById('attendance-form');
            if (!formWrap) return;
            var form = formWrap.querySelector('form');
            if (!form) return;
            if (lockFormSubmit(form)) return;
            attendanceSubmitting = true;
            form.submit();
        }

        function submitAttendanceForNames(names, action, extra) {
            if (attendanceSubmitting) return;
            selectedAttendanceNames = Array.isArray(names) ? names.slice().filter(Boolean) : [];
            renderSelectedCount();
            syncAttendanceHiddenFields();
            if (!selectedAttendanceNames.length) {
                alert('{{ texts.get("hr_select_employee", "请选择员工") }}');
                return;
            }
            if (action === 'overtime') {
                var otHoursEl = document.getElementById('attendance-ot-hours');
                var otHours = extra && typeof extra.overtime_hours !== 'undefined' ? Number(extra.overtime_hours) : Number(otHoursEl ? otHoursEl.value || 0 : 0);
                if (!Number.isFinite(otHours) || otHours <= 0) {
                    alert('{{ texts.get("hr_overtime_hours_positive", "加班时间必须大于 0") }}');
                    return;
                }
                if (otHoursEl) otHoursEl.value = String(otHours);
            }
            if (action === 'special_off') {
                var specialHoursEl = document.getElementById('attendance-special-hours');
                var specialHours = extra && typeof extra.special_hours !== 'undefined' ? Number(extra.special_hours) : Number(specialHoursEl ? specialHoursEl.value || 0 : 0);
                if (!Number.isFinite(specialHours) || specialHours <= 0) {
                    alert('{{ texts.get("hr_work_hours_positive", "工作时长必须大于 0") }}');
                    return;
                }
                if (specialHoursEl) specialHoursEl.value = String(specialHours);
            }
            submitAttendanceBatch(action);
        }

        function submitAttendanceBubbleAction(action) {
            var name = attendanceBubbleName || '';
            if (!name) return;
            var triggerBtn = null;
            if (window.event && window.event.target && window.event.target.classList) {
                triggerBtn = window.event.target;
                triggerBtn.classList.add('is-pressed');
                window.setTimeout(function() {
                    if (triggerBtn) triggerBtn.classList.remove('is-pressed');
                }, 140);
            }
            if (action === 'overtime') {
                openAttendanceInputSheet('overtime', name, '{{ texts.get("hr_input_overtime_title", "录入加班时长") }}', '{{ texts.get("hr_input_overtime_subtitle", "请输入这位员工今天的加班时长") }}', '2');
                return;
            }
            if (action === 'special_off') {
                openAttendanceInputSheet('special_off', name, '{{ texts.get("hr_input_checkout_title", "录入下班工时") }}', '{{ texts.get("hr_input_checkout_subtitle", "请输入这位员工今天已工作时长") }}', '8');
                return;
            }
            closeAttendanceActionBubble();
            submitAttendanceForNames([name], action, {});
        }

        function openAttendanceInputSheet(action, name, title, subtitle, defaultValue) {
            attendanceInputSheetAction = action || '';
            var sheet = document.getElementById('attendance-input-sheet');
            var titleEl = document.getElementById('attendance-input-sheet-title');
            var subEl = document.getElementById('attendance-input-sheet-subtitle');
            var inputEl = document.getElementById('attendance-input-sheet-value');
            if (!sheet || !titleEl || !subEl || !inputEl) return;
            titleEl.textContent = title || '';
            subEl.textContent = (name ? (name + ' · ') : '') + (subtitle || '');
            inputEl.value = String(defaultValue || '');
            closeAttendanceActionBubble();
            sheet.style.display = 'flex';
            window.requestAnimationFrame(function() {
                sheet.classList.add('is-visible');
                window.setTimeout(function() {
                    inputEl.focus();
                    inputEl.select();
                }, 40);
            });
        }

        function closeAttendanceInputSheet() {
            attendanceInputSheetAction = '';
            var sheet = document.getElementById('attendance-input-sheet');
            if (!sheet) return;
            sheet.classList.remove('is-visible');
            window.setTimeout(function() {
                if (!sheet.classList.contains('is-visible')) {
                    sheet.style.display = 'none';
                }
            }, 180);
        }

        function confirmAttendanceInputSheet() {
            var name = attendanceBubbleName || '';
            var action = attendanceInputSheetAction || '';
            var inputEl = document.getElementById('attendance-input-sheet-value');
            var raw = inputEl ? inputEl.value : '';
            var num = Number(raw || 0);
            if (!name || !action) return;
            if (!Number.isFinite(num) || num <= 0) {
                alert(action === 'overtime' ? '{{ texts.get("hr_overtime_hours_positive", "加班时间必须大于 0") }}' : '{{ texts.get("hr_work_hours_positive", "工作时长必须大于 0") }}');
                if (inputEl) inputEl.focus();
                return;
            }
            closeAttendanceInputSheet();
            if (action === 'overtime') {
                submitAttendanceForNames([name], 'overtime', { overtime_hours: num });
                return;
            }
            if (action === 'special_off') {
                submitAttendanceForNames([name], 'special_off', { special_hours: num });
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            var teamEl = document.getElementById('team-select');
            if (teamEl) {
                teamEl.addEventListener('change', function() {
                    refreshPositionOptionsByIds('team-select', 'position-select');
                });
                refreshPositionOptionsByIds('team-select', 'position-select');
            }
            var editTeamEl = document.getElementById('edit-team-select');
            if (editTeamEl) {
                editTeamEl.addEventListener('change', function() {
                    refreshPositionOptionsByIds('edit-team-select', 'edit-position-select');
                });
                refreshPositionOptionsByIds('edit-team-select', 'edit-position-select');
            }
            var specialEmpEl = document.getElementById('special-task-name');
            var specialTeamEl = document.getElementById('special-task-team');
            if (specialEmpEl && specialTeamEl) {
                specialEmpEl.addEventListener('change', function() {
                    if ((specialEmpEl.value || '').trim()) {
                        specialTeamEl.value = '';
                    }
                });
                specialTeamEl.addEventListener('change', function() {
                    if ((specialTeamEl.value || '').trim()) {
                        specialEmpEl.value = '';
                    }
                });
            }
            var specialTaskForm = document.getElementById('special-task-form');
            if (specialTaskForm && specialEmpEl && specialTeamEl) {
                specialTaskForm.addEventListener('submit', function(evt) {
                    var emp = (specialEmpEl.value || '').trim();
                    var team = (specialTeamEl.value || '').trim();
                    if (!emp && !team) {
                        evt.preventDefault();
                        alert('{{ texts.get("hr_special_task_target_hint", "可选员工或班组。若同时选择，优先按员工入账；若只选班组，则记为班组专项费用。") }}');
                    }
                });
            }
            var filterEl = document.getElementById('card-status-filter');
            if (filterEl) {
                filterEl.addEventListener('change', applyEmpCardFilter);
                applyEmpCardFilter();
            }
            document.querySelectorAll('form').forEach(function(form) {
                form.addEventListener('submit', function(evt) {
                    if (lockFormSubmit(form)) {
                        evt.preventDefault();
                    }
                });
            });
            document.addEventListener('keydown', function(evt) {
                if (evt.key === 'Escape') {
                    closeAttendanceInputSheet();
                    closeAttendanceActionBubble();
                    closeAddEmployeeModal();
                    closeSpecialTaskModal();
                    closeAttendanceViewModal();
                    closePayrollViewModal();
                    closeLeftEmployeesModal();
                }
            });
            document.addEventListener('click', function(evt) {
                var bubble = document.getElementById('attendance-action-bubble');
                if (!bubble) return;
                if (bubble.contains(evt.target)) return;
                if (evt.target.closest && evt.target.closest('.emp-card')) return;
                closeAttendanceActionBubble();
            });
            var sheet = document.getElementById('attendance-input-sheet');
            if (sheet) {
                sheet.addEventListener('click', function(evt) {
                    if (evt.target === sheet) {
                        closeAttendanceInputSheet();
                    }
                });
            }
            var inputEl = document.getElementById('attendance-input-sheet-value');
            if (inputEl) {
                inputEl.addEventListener('keydown', function(evt) {
                    if (evt.key === 'Enter') {
                        evt.preventDefault();
                        confirmAttendanceInputSheet();
                    }
                });
            }
            renderSelectedCount();
            syncAttendanceHiddenFields();
        });
    </script>
